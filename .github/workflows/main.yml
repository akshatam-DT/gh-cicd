name: CI-CD Pipeline (Vite React SaaS)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest   # change to ubuntu-latest if not using self-hosted

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        
      # =========================
      # 4. SonarQube Scan
      # =========================
      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONARQUBE_URL }}
        run: |
          npx sonar-scanner \
            -Dsonar.projectKey=saas-landing \
            -Dsonar.sources=. \
            -Dsonar.host.url=$SONARQUBE_URL \
            -Dsonar.login=$SONARQUBE_TOKEN


      # =========================
      # 5. Build Vite app
      # =========================
      - name: Build React App
        run: npm run build
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PW }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/app-fe:${{ github.sha }} .
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/app-fe:${{ github.sha }} 

      - name: Update CD repo
        run: |
          git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/akshatam-DT/gh-cd.git
          cd gh-cd

          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/app-fe:${{ github.sha }}|g" deployment.yaml

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "Update image to ${{ github.sha }}" || echo "No changes"
          git push


     
      

