name: CI-CD Pipeline (Vite React SaaS)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest   # change to ubuntu-latest if not using self-hosted

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # =========================
      # 5. Build Vite app
      # =========================
      - name: Build React App
        run: npm run build
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PW }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/app-fe:latest .
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/app-fe:latest     


     
      

