name: CI-CD Pipeline (Xora)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ========================
      # 1️⃣ BUILD IMAGE
      # ========================
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/xora:xora-v${{ github.run_number }} .

      # ========================
      # 2️⃣ TRIVY SCAN
      # ========================
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/xora:xora-v${{ github.run_number }}
          format: table
          severity: CRITICAL,HIGH

      # ========================
      # 3️⃣ LOGIN TO DOCKER HUB
      # ========================
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PW }}

      # ========================
      # 4️⃣ PUSH IMAGE
      # ========================
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/xora:xora-v${{ github.run_number }}
