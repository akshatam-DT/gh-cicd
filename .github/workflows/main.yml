name: CI-CD Pipeline (Vite React SaaS)

on:
  push:
    branches: [ "main" ]

jobs:
  # 1. BUILD JOB
  build:
    runs-on: self-hosted  
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

  # 2. TEST JOB (SonarQube)
  test:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and analyze
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # 3. DOCKER JOB
  docker:
    needs: test
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PW }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/xora:xora-v${{ github.run_number }} .

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
           image-ref: ${{ secrets.DOCKER_USERNAME }}/xora:xora-v${{ github.run_number }}
           format: table
           exit-code: 0
           severity: CRITICAL,HIGH

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/xora:xora-v${{ github.run_number }}

  # 4. DEPLOY JOB
  deploy:
    needs: docker
    runs-on: self-hosted
    steps:
      - name: Update CD Repository
        run: |
          git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/akshatam-DT/gh-cd.git temp-cd
          cd temp-cd
          IMAGE="${{ secrets.DOCKER_USERNAME }}/xora:xora-v${{ github.run_number }}"
          
          sed -i "s|image:.*|image: ${IMAGE}|g" deployment.yaml

          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add deployment.yaml
            git commit -m "Update xora image to xora-v${{ github.run_number }} [skip ci]"
            git push
          else
            echo "No changes detected in deployment.yaml"
          fi
